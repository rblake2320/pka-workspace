schema_version: pbp/v0.1
steps:
- step: 1
  name: navigate_homepage
  action: navigate
  url: https://www.bestbuy.com
  wait_ms: 3000
  verify: page.title contains 'Best Buy' OR search bar visible
  selectors: []
  on_failure: retry once, then abort
- step: 2
  name: search_item
  action: navigate
  url: https://www.bestbuy.com/site/searchpage.jsp?st={search_term}
  url_notes: Replace spaces in search_term with +. URL param 'st=' is stable (years).
  wait_ms: 4000
  verify: results grid visible, Add to cart buttons present
  selectors:
  - purpose: search URL
    pattern: https://www.bestbuy.com/site/searchpage.jsp?st=
    stability: HIGH
  on_failure: check search_term encoding, retry
- step: 3
  name: add_to_cart
  action: click
  selector: role=button[name='Add to cart']
  selector_index: '{item_index}'
  wait_ms: 3000
  verify: flyout shows 'Added to cart' with green checkmark
  stability: HIGH
  on_failure: if 'Sold Out' or 'Coming Soon' → abort or increment item_index
  selectors:
  - purpose: add to cart
    pattern: internal:role=button[name="Add to cart"i]
    stability: HIGH
- step: 4
  name: go_to_cart
  action: click
  selector: text='Go to cart'
  fallback_url: https://www.bestbuy.com/cart
  wait_ms: 3000
  verify: page shows 'Your Cart' with item listed, Checkout button visible
  stability: HIGH
  on_failure: navigate directly to https://www.bestbuy.com/cart
- step: 5
  name: checkout
  action: click
  selector: role=button[name='Checkout']
  wait_ms: 4000
  verify: redirected through identity/signin page
  redirect_path: /cart → /identity/signin?token=... → may auto-advance
  stability: HIGH
  on_failure: wait additional 3000ms and check URL
- step: 6
  name: continue_as_guest
  action: click
  selector: role=button[name='Continue as Guest']
  wait_ms: 3000
  verify: redirected to /checkout/r/fulfillment, shipping form visible
  stability: MEDIUM
  on_failure: if button absent, site requires account — abort guest flow
- step: 7
  name: fill_shipping_contact
  action: fill_form
  wait_ms: 1000
  fields:
  - label: First Name
    value: '{first_name}'
    type: text
    selector_pattern: internal:label="First Name"i >> nth=0
  - label: Last Name
    value: '{last_name}'
    type: text
    selector_pattern: internal:label="Last Name"i >> nth=0
  - label: Address
    value: '{address}'
    type: text
    selector_pattern: internal:label="Address"i >> nth=0
  - action: dismiss_autocomplete
    method: click heading h2:has-text('Shipping')
    wait_ms: 1500
    reason: Address autocomplete dropdown blocks City/ZIP fields
  - label: City
    value: '{city}'
    type: text
    selector_pattern: internal:label="City"i >> nth=0
  - label: State
    value: '{state}'
    type: select
    selector_pattern: internal:label="State"i
  - label: ZIP Code
    value: '{zip}'
    type: text
    selector_pattern: internal:label="ZIP Code"i
  - label: Email Address
    value: '{email}'
    type: email
    selector_pattern: internal:label="Email Address"i
  - label: Phone Number
    value: '{phone}'
    type: tel
    selector_pattern: internal:label="Phone Number"i
    format: 10 digits no punctuation
  gotchas:
  - Address autocomplete MUST be dismissed before filling City/ZIP
  - 'Phone: 10 digits, no dashes (6125551234 not 612-555-1234)'
  - 'Use as billing address: pre-checked, leave it'
  - 'Opt-In text updates: unchecked by default, leave it'
  stability: HIGH
- step: 8
  name: verify_and_stop
  action: screenshot_and_stop
  wait_ms: 0
  verify: all form fields filled, Continue to Payment Information button visible
  stop: true
  stop_reason: STOP_POINT — do NOT click Continue to Payment Information unless explicitly
    authorized
  selector_to_not_click: role=button[name='Continue to Payment Information']
  stability: MEDIUM
error_recovery:
- condition: Add to cart button missing
  recovery: Item sold out — try next result or different item
- condition: Flyout doesn't appear after add
  recovery: Navigate directly to https://www.bestbuy.com/cart
- condition: Sign-in page without Guest option
  recovery: Abort — site requires account for this flow
- condition: Address autocomplete blocks City/ZIP
  recovery: Click any heading text to dismiss, then fill City/ZIP
- condition: Phone validation error
  recovery: Ensure exactly 10 digits, no punctuation
- condition: Page timeout or blank
  recovery: Refresh once, wait 5s. If still blank, restart from step 1
- condition: CAPTCHA or bot detection
  recovery: Cannot proceed automatically — flag for human review
timing_budget_ms:
  homepage_load: 3000
  search_results: 4000
  after_add_to_cart: 3000
  cart_page: 3000
  after_checkout_click: 4000
  after_guest_click: 3000
  after_address_type: 1500
  after_all_fields: 1000
  total_estimate: 25000-30000
