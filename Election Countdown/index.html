    <script>
      (function hardenLaunchTheme() {
        try {
          localStorage.setItem("theme", "light");
        } catch (error) {}

        function cleanThemeToggle() {
          document.documentElement.classList.remove("dark");

          var buttons = document.querySelectorAll("button");
          buttons.forEach(function(button) {
            var label = (button.textContent || button.getAttribute("aria-label") || "").trim();
            if (label === "Toggle theme") {
              button.remove();
            }
          });
        }

        document.addEventListener("DOMContentLoaded", function() {
          cleanThemeToggle();
          new MutationObserver(cleanThemeToggle).observe(document.body, {
            childList: true,
            subtree: true
          });
        });
      })();
    </script>
    <script>
      (function captureLaunchIntelligence() {
        var visitorKey = "ec_visitor_id";
        var visitorId = "";
        try {
          visitorId = localStorage.getItem(visitorKey);
          if (!visitorId) {
            visitorId = "v_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
            localStorage.setItem(visitorKey, visitorId);
          }
        } catch (error) {
          visitorId = "v_anon";
        }

        var currentCountdown = null;
        var currentStartedAt = Date.now();
        var pageStartedAt = Date.now();
        var lastHeartbeatAt = 0;

        function countdownFromText() {
          var text = document.body ? document.body.innerText || "" : "";
          if (text.indexOf("2026 Midterm Elections") !== -1) return "2026_midterms";
          if (text.indexOf("2028 Presidential Election") !== -1) return "2028_presidential";
          if (text.indexOf("2029 Inauguration Day") !== -1) return "2029_inauguration";
          return "unknown";
        }

        function basePayload(extra) {
          return Object.assign({
            visitorId: visitorId,
            path: location.pathname,
            title: document.title,
            referrer: document.referrer || "",
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
            viewport: {
              width: window.innerWidth,
              height: window.innerHeight
            },
            currentCountdown: currentCountdown || countdownFromText(),
            pageElapsedMs: Date.now() - pageStartedAt
          }, extra || {});
        }

        function send(type, payload, beacon) {
          var body = JSON.stringify(basePayload(payload));
          var url = "/api/track/" + encodeURIComponent(type);
          if (beacon && navigator.sendBeacon) {
            try {
              navigator.sendBeacon(url, new Blob([body], { type: "application/json" }));
              return;
            } catch (error) {}
          }
          try {
            fetch(url, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: body,
              keepalive: !!beacon,
              credentials: "include"
            }).catch(function() {});
          } catch (error) {}
        }

        function updateCountdown(reason) {
          var next = countdownFromText();
          if (!currentCountdown) {
            currentCountdown = next;
            currentStartedAt = Date.now();
            send("event", { eventName: "countdown_view", countdown: next, reason: reason || "initial" });
            return;
          }
          if (next !== currentCountdown) {
            var previous = currentCountdown;
            var durationMs = Date.now() - currentStartedAt;
            send("flip", {
              eventName: "countdown_change",
              fromCountdown: previous,
              toCountdown: next,
              durationMs: durationMs,
              reason: reason || "detected"
            });
            currentCountdown = next;
            currentStartedAt = Date.now();
          }
        }

        function clickLabel(element) {
          return ((element.innerText || element.getAttribute("aria-label") || element.title || "").trim()).slice(0, 120);
        }

        document.addEventListener("DOMContentLoaded", function() {
          updateCountdown("dom_ready");
          send("event", {
            eventName: "page_view",
            userAgent: navigator.userAgent,
            language: navigator.language || "",
            screen: { width: screen.width, height: screen.height }
          });

          new MutationObserver(function() {
            updateCountdown("dom_mutation");
          }).observe(document.body, { childList: true, subtree: true, characterData: true });
        });

        document.addEventListener("click", function(event) {
          var target = event.target && event.target.closest && event.target.closest("a,button,[role='button']");
          if (!target) return;
          var label = clickLabel(target);
          send("event", {
            eventName: "cta_click",
            label: label,
            href: target.href || "",
            testId: target.getAttribute("data-testid") || "",
            role: target.getAttribute("role") || target.tagName.toLowerCase()
          });
          if ((target.href || "").indexOf("vote.gov") !== -1 || label.indexOf("Vote.gov") !== -1) {
            send("event", { eventName: "vote_gov_click", label: label, href: target.href || "" });
          }
          if (label.indexOf("already registered") !== -1) {
            send("event", { eventName: "already_registered_click" });
          }
        }, true);

        document.addEventListener("visibilitychange", function() {
          if (document.visibilityState === "hidden") {
            send("event", {
              eventName: "visibility_hidden",
              countdownDurationMs: Date.now() - currentStartedAt
            }, true);
          } else {
            currentStartedAt = Date.now();
            send("event", { eventName: "visibility_visible" });
          }
        });

        window.addEventListener("beforeunload", function() {
          send("event", {
            eventName: "page_exit",
            totalDurationMs: Date.now() - pageStartedAt,
            countdownDurationMs: Date.now() - currentStartedAt
          }, true);
        });

        setInterval(function() {
          var now = Date.now();
          if (document.visibilityState === "hidden" || now - lastHeartbeatAt < 14000) return;
          lastHeartbeatAt = now;
          updateCountdown("heartbeat");
          send("event", {
            eventName: "heartbeat",
            countdownDurationMs: now - currentStartedAt
          });
        }, 15000);
      })();
    </script>
