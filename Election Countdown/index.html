    <script>
      (function normalizeDirectRoutes() {
        var appRoutes = ["/admin", "/profile", "/donor-analytics"];
        if (appRoutes.indexOf(location.pathname) !== -1 && !location.hash) {
          location.replace("/#" + location.pathname);
        }
      })();
    </script>
    <script>
      (function hardenLaunchTheme() {
        try {
          localStorage.removeItem("theme");
        } catch (error) {}

        function cleanThemeToggle() {
          document.documentElement.classList.remove("dark");

          var buttons = document.querySelectorAll("button");
          buttons.forEach(function(button) {
            var label = (button.textContent || button.getAttribute("aria-label") || "").trim();
            if (label === "Toggle theme") {
              button.remove();
            }
          });
        }

        document.addEventListener("DOMContentLoaded", function() {
          cleanThemeToggle();
          new MutationObserver(cleanThemeToggle).observe(document.body, {
            childList: true,
            subtree: true
          });
        });
      })();
    </script>
    <script>
      (function launchInteractionFixes() {
        var nativeFetch = window.fetch ? window.fetch.bind(window) : null;
        var trackQueue = [];
        var trackFlushTimer = null;

        function flushTrackingQueue(beacon) {
          if (!trackQueue.length) return;
          var events = trackQueue.splice(0, 50);
          var body = JSON.stringify({ events: events, flushedAt: new Date().toISOString() });
          if (beacon && navigator.sendBeacon) {
            try {
              if (navigator.sendBeacon("/api/track/batch", new Blob([body], { type: "application/json" }))) {
                return;
              }
            } catch (error) {}
          }
          if (!beacon && nativeFetch) {
            nativeFetch("/api/track/batch", {
              method: "POST",
              headers: { "content-type": "application/json" },
              credentials: "include",
              body: body,
              keepalive: true
            }).catch(function() {});
          }
        }

        function queueTracking(url, init) {
          var type = "event";
          try {
            type = String(url).split("/api/track/")[1].split(/[?#]/)[0] || "event";
          } catch (error) {}
          var payload = {};
          try {
            payload = init && init.body ? JSON.parse(init.body) : {};
          } catch (error) {
            payload = { raw: String(init && init.body || "").slice(0, 500) };
          }
          trackQueue.push({ type: type, payload: payload, queuedAt: new Date().toISOString() });
          if (trackQueue.length >= 25) {
            flushTrackingQueue(false);
          } else if (!trackFlushTimer) {
            trackFlushTimer = setTimeout(function() {
              trackFlushTimer = null;
              flushTrackingQueue(false);
            }, 8000);
          }
        }

        if (nativeFetch && navigator.sendBeacon) {
          window.fetch = function(input, init) {
            var url = typeof input === "string" ? input : input && input.url;
            if (url && url.indexOf("/api/track/") !== -1 && init && String(init.method || "GET").toUpperCase() === "POST") {
              queueTracking(url, init);
              return Promise.resolve(new Response(JSON.stringify({ ok: true, queued: true }), {
                status: 200,
                headers: { "content-type": "application/json" }
              }));
            }
            return nativeFetch(input, init);
          };
          window.addEventListener("pagehide", function() { flushTrackingQueue(true); });
          document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === "hidden") flushTrackingQueue(true);
          });
        }

        function labelOf(element) {
          return ((element && (element.innerText || element.getAttribute("aria-label") || element.title)) || "").trim();
        }

        function resetHorizontalDrift() {
          var y = window.scrollY || document.documentElement.scrollTop || 0;
          document.documentElement.scrollLeft = 0;
          document.body.scrollLeft = 0;
          window.scrollTo(0, y);
          document.querySelectorAll("#root > *, .min-h-screen").forEach(function(element) {
            element.scrollLeft = 0;
          });
        }

        function hardResetDriftSoon() {
          resetHorizontalDrift();
          requestAnimationFrame(resetHorizontalDrift);
          setTimeout(resetHorizontalDrift, 80);
          setTimeout(resetHorizontalDrift, 250);
          setTimeout(resetHorizontalDrift, 600);
        }

        function closeTopDialog() {
          var dialogs = Array.from(document.querySelectorAll('[role="dialog"]'));
          var dialog = dialogs[dialogs.length - 1];
          if (!dialog) return false;
          var closeButton = Array.from(dialog.querySelectorAll("button")).find(function(button) {
            return labelOf(button) === "Close" || button.querySelector(".sr-only") && labelOf(button.querySelector(".sr-only")) === "Close";
          });
          if (closeButton) {
            closeButton.click();
            hardResetDriftSoon();
            return true;
          }
          return false;
        }

        function showCopyFeedback(button) {
          if (!button || button.dataset.launchCopied === "1") return;
          var original = button.innerHTML;
          button.dataset.launchCopied = "1";
          button.textContent = "Copied!";
          setTimeout(function() {
            button.innerHTML = original;
            delete button.dataset.launchCopied;
          }, 1600);
        }

        function ensureRegisteredUndo() {
          var text = document.body ? document.body.innerText || "" : "";
          if (text.indexOf("You're all set!") === -1 || document.querySelector("[data-launch-reset-registration]")) return;
          var candidates = Array.from(document.querySelectorAll("div, section, article")).filter(function(element) {
            return (element.innerText || "").indexOf("You're all set!") !== -1;
          });
          var panel = candidates[candidates.length - 1];
          if (!panel) return;
          var button = document.createElement("button");
          button.type = "button";
          button.dataset.launchResetRegistration = "1";
          button.textContent = "Update registration status";
          button.style.cssText = "margin-top:10px;color:#1d4ed8;background:transparent;border:0;padding:0;font:600 13px Inter,system-ui,sans-serif;text-decoration:underline;cursor:pointer;";
          button.addEventListener("click", function() {
            try { localStorage.removeItem("ec_voter_registered"); } catch (error) {}
            location.reload();
          });
          panel.appendChild(button);
        }

        function hardenAuthEmail(input) {
          if (!input || input.dataset.launchEmailHardened === "1") return;
          input.dataset.launchEmailHardened = "1";
          input.addEventListener("input", function() {
            input.setCustomValidity("");
            var message = input.parentElement && input.parentElement.querySelector("[data-launch-email-error]");
            if (message) message.remove();
          });
          input.addEventListener("invalid", function() {
            input.setCustomValidity("Please enter a valid email address.");
            var parent = input.parentElement;
            if (parent && !parent.querySelector("[data-launch-email-error]")) {
              var message = document.createElement("p");
              message.dataset.launchEmailError = "1";
              message.textContent = "Please enter a valid email address.";
              message.style.cssText = "margin-top:6px;color:#b91c1c;font-size:13px;";
              parent.appendChild(message);
            }
          });
        }

        function hardenPhoneInput(input) {
          if (!input || input.dataset.launchPhoneHardened === "1") return;
          input.dataset.launchPhoneHardened = "1";
          input.addEventListener("focus", function() {
            input.select();
          });
          input.addEventListener("input", function() {
            var value = input.value.replace(/[^\d+]/g, "");
            if (value.indexOf("+") > 0) value = value.replace(/\+/g, "");
            if (value !== input.value) input.value = value;
          });
        }

        function showVerificationUnavailableNotice() {
          if (document.querySelector("[data-launch-verification-notice]")) return;
          closeTopDialog();
          var backdrop = document.createElement("div");
          backdrop.dataset.launchVerificationNotice = "1";
          backdrop.setAttribute("role", "dialog");
          backdrop.setAttribute("aria-modal", "true");
          backdrop.setAttribute("aria-label", "Verification status");
          backdrop.style.cssText = "position:fixed;inset:0;z-index:120;background:rgba(15,23,42,.42);display:grid;place-items:center;padding:20px;";
          backdrop.innerHTML = [
            "<section style='width:min(440px,100%);border-radius:8px;background:#fff;padding:22px;box-shadow:0 24px 70px rgba(15,23,42,.28);font-family:Inter,system-ui,sans-serif;color:#0f172a'>",
            "<div style='display:flex;align-items:start;justify-content:space-between;gap:14px'><div><h2 style='margin:0;font-size:20px;line-height:1.2;font-weight:800'>Verification coming soon</h2><p style='margin:8px 0 0;color:#475569;font-size:14px;line-height:1.45'>Email and phone verification are not enabled yet. Your account and vote-plan data still save normally.</p></div><button type='button' aria-label='Close' data-launch-close-verification style='border:0;background:transparent;font-size:24px;line-height:1;cursor:pointer;color:#334155'>&times;</button></div>",
            "<button type='button' data-launch-close-verification style='margin-top:18px;width:100%;border:0;border-radius:8px;background:#1d4ed8;color:#fff;padding:10px 14px;font-weight:800;cursor:pointer'>Got it</button>",
            "</section>"
          ].join("");
          backdrop.addEventListener("click", function(event) {
            if (event.target === backdrop || event.target.closest("[data-launch-close-verification]")) {
              backdrop.remove();
              hardResetDriftSoon();
            }
          });
          document.body.appendChild(backdrop);
          if (nativeFetch) nativeFetch("/api/verify/status", { credentials: "include" }).catch(function() {});
        }

        function exposeVerificationNotice() {
          Array.from(document.querySelectorAll("button, [role='menuitem']")).forEach(function(element) {
            if (labelOf(element) === "Verify Identity" && element.dataset.launchVerifyNotice !== "1") {
              element.dataset.launchVerifyNotice = "1";
              element.style.display = "";
              element.removeAttribute("aria-hidden");
            }
          });
        }

        function showRegisteredConfirmation() {
          var candidates = Array.from(document.querySelectorAll("section, article, div")).filter(function(element) {
            var text = element.innerText || "";
            return text.indexOf("Are You Registered to Vote?") !== -1 && text.indexOf("I'm already registered") !== -1;
          });
          var card = candidates.reduce(function(best, element) {
            if (!best) return element;
            return (element.innerText || "").length < (best.innerText || "").length ? element : best;
          }, null);
          if (!card) return;
          card.innerHTML = [
            "<div style='display:grid;gap:10px;text-align:center'>",
            "<h2 style='margin:0;color:#0f172a;font:800 20px/1.2 Inter,system-ui,sans-serif'>You're all set!</h2>",
            "<p style='margin:0;color:#475569;font:14px/1.45 Inter,system-ui,sans-serif'>Your registration status is saved on this device.</p>",
            "<button type='button' data-launch-reset-registration='1' style='justify-self:center;margin-top:4px;color:#1d4ed8;background:transparent;border:0;padding:0;font:700 13px Inter,system-ui,sans-serif;text-decoration:underline;cursor:pointer'>Update registration status</button>",
            "</div>"
          ].join("");
        }

        function ensureRequiredVotingHints() {
          var dialog = Array.from(document.querySelectorAll('[role="dialog"]')).find(function(element) {
            return (element.innerText || "").indexOf("Your Voting Plan") !== -1;
          });
          if (!dialog || dialog.querySelector("[data-launch-vote-hint]")) return;
          var submit = Array.from(dialog.querySelectorAll("button")).find(function(button) {
            return /Submit My Intent|Update My Intent/.test(labelOf(button));
          });
          if (!submit) return;
          var hint = document.createElement("p");
          hint.dataset.launchVoteHint = "1";
          hint.textContent = "Pick a vote choice and a state to submit.";
          hint.style.cssText = "margin:10px 0 0;color:#475569;font-size:13px;text-align:center;";
          submit.parentElement.insertBefore(hint, submit);
        }

        function formatDate(value) {
          if (!value) return "Not available";
          try { return new Date(value).toLocaleString(); } catch (error) { return value; }
        }

        function intentLabel(value) {
          var labels = {
            red: "Republican",
            blue: "Democrat",
            independent: "Independent",
            undecided: "Undecided"
          };
          return labels[value] || value || "Not submitted";
        }

        function stateName(value) {
          var states = {
            AL: "Alabama", AK: "Alaska", AZ: "Arizona", AR: "Arkansas", CA: "California", CO: "Colorado",
            CT: "Connecticut", DE: "Delaware", FL: "Florida", GA: "Georgia", HI: "Hawaii", ID: "Idaho",
            IL: "Illinois", IN: "Indiana", IA: "Iowa", KS: "Kansas", KY: "Kentucky", LA: "Louisiana",
            ME: "Maine", MD: "Maryland", MA: "Massachusetts", MI: "Michigan", MN: "Minnesota",
            MS: "Mississippi", MO: "Missouri", MT: "Montana", NE: "Nebraska", NV: "Nevada",
            NH: "New Hampshire", NJ: "New Jersey", NM: "New Mexico", NY: "New York",
            NC: "North Carolina", ND: "North Dakota", OH: "Ohio", OK: "Oklahoma", OR: "Oregon",
            PA: "Pennsylvania", RI: "Rhode Island", SC: "South Carolina", SD: "South Dakota",
            TN: "Tennessee", TX: "Texas", UT: "Utah", VT: "Vermont", VA: "Virginia",
            WA: "Washington", WV: "West Virginia", WI: "Wisconsin", WY: "Wyoming", DC: "Washington, DC"
          };
          return states[value] || value || "";
        }

        function formatIntentSummary(intent) {
          if (!intent) return "No vote intent submitted yet.";
          return [intentLabel(intent.intent), stateName(intent.state), intent.city].filter(Boolean).join(" / ");
        }

        function formatHistoryItem(item) {
          var when = formatDate(item.changedAt);
          var next = intentLabel(item.newIntent);
          var nextState = stateName(item.newState);
          if (!item.previousIntent) {
            return when + " - Set to " + next + (nextState ? " in " + nextState : "");
          }
          return when + " - Changed from " + intentLabel(item.previousIntent) + (item.previousState ? " (" + stateName(item.previousState) + ")" : "") + " to " + next + (nextState ? " (" + nextState + ")" : "");
        }

        function ensureProfileHeaderActions() {
          if (location.hash !== "#/profile" || document.querySelector("[data-launch-profile-header-actions]")) return;
          var headerInner = document.querySelector("header > div") || document.querySelector("header");
          if (!headerInner) return;
          var actions = document.createElement("nav");
          actions.dataset.launchProfileHeaderActions = "1";
          actions.style.cssText = "margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;";
          actions.innerHTML = [
            "<a href='/' style='border:1px solid rgba(15,23,42,.16);border-radius:8px;background:#fff;color:#0f172a;padding:8px 11px;font:800 13px Inter,system-ui,sans-serif;text-decoration:none'>Home</a>",
            "<button type='button' data-launch-profile-share style='border:1px solid rgba(29,78,216,.28);border-radius:8px;background:#eff6ff;color:#1d4ed8;padding:8px 11px;font:800 13px Inter,system-ui,sans-serif;cursor:pointer'>Share</button>",
            "<button type='button' data-launch-profile-logout style='border:1px solid rgba(15,23,42,.18);border-radius:8px;background:#fff;color:#334155;padding:8px 11px;font:800 13px Inter,system-ui,sans-serif;cursor:pointer'>Log out</button>"
          ].join("");
          headerInner.appendChild(actions);
        }

        function ensureHomeActionPanel() {
          if (location.hash && location.hash !== "#/" || document.querySelector("[data-launch-home-actions]")) return;
          var main = document.querySelector("main");
          if (!main || (document.body.innerText || "").indexOf("Election Countdown") === -1) return;
          Promise.all([
            nativeFetch ? nativeFetch("/api/auth/user", { credentials: "include" }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; }) : Promise.resolve(null),
            nativeFetch ? nativeFetch("/api/intent", { credentials: "include" }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; }) : Promise.resolve(null)
          ]).then(function(results) {
            if (document.querySelector("[data-launch-home-actions]")) return;
            var user = results[0];
            var intent = results[1];
            if (!user) return;
            var panel = document.createElement("section");
            panel.dataset.launchHomeActions = "1";
            panel.style.cssText = "width:min(760px,calc(100% - 32px));margin:22px auto 0;border:1px solid rgba(15,23,42,.14);border-radius:8px;background:rgba(255,255,255,.94);padding:18px;display:grid;gap:14px;font-family:Inter,system-ui,sans-serif;color:#0f172a;";
            panel.innerHTML = [
              "<div style='display:grid;gap:6px'><h2 style='margin:0;font-size:18px;line-height:1.25;font-weight:800'>Voter Actions</h2><p style='margin:0;color:#475569;font-size:14px'>Keep your registration status and vote plan up to date.</p></div>",
              "<div style='display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px'>",
              "<article style='border:1px solid rgba(15,23,42,.12);border-radius:8px;padding:14px;background:#fff'><h3 style='margin:0 0 6px;font-size:15px;font-weight:800'>Registration Status</h3><p style='margin:0 0 10px;color:#475569;font-size:13px'>" + (localStorage.getItem("ec_voter_registered") === "true" ? "You're marked as registered on this device." : "Confirm or update your registration status.") + "</p><button type='button' data-launch-home-registration style='border:0;border-radius:8px;background:#1d4ed8;color:#fff;padding:9px 12px;font-weight:800;cursor:pointer'>" + (localStorage.getItem("ec_voter_registered") === "true" ? "Update Registration Status" : "I'm already registered") + "</button></article>",
              "<article style='border:1px solid rgba(15,23,42,.12);border-radius:8px;padding:14px;background:#fff'><h3 style='margin:0 0 6px;font-size:15px;font-weight:800'>Vote Plan</h3><p style='margin:0 0 10px;color:#475569;font-size:13px'>" + (intent ? "Current plan: " + formatIntentSummary(intent) : "No vote plan submitted yet.") + "</p><a href='/#/profile' style='display:inline-block;border:1px solid rgba(29,78,216,.28);border-radius:8px;background:#eff6ff;color:#1d4ed8;padding:9px 12px;font-weight:800;text-decoration:none'>" + (intent ? "Update Vote Plan" : "Share Your Vote Plan") + "</a></article>",
              "</div>"
            ].join("");
            main.appendChild(panel);
          });
        }

        function ensureProfileDetails() {
          if (location.hash !== "#/profile" || document.querySelector("[data-launch-profile-details]")) return;
          var main = document.querySelector("main");
          if (!main) return;
          Promise.all([
            nativeFetch ? nativeFetch("/api/account", { credentials: "include" }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; }) : Promise.resolve(null),
            nativeFetch ? nativeFetch("/api/intent", { credentials: "include" }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; }) : Promise.resolve(null)
          ]).then(function(results) {
            if (document.querySelector("[data-launch-profile-details]")) return;
            var account = results[0];
            var intent = results[1] || account && account.intent;
            if (!account || !account.user) return;
            var user = account.user;
            var verification = account.verification || {};
            var history = account.intentHistory || [];
            var panel = document.createElement("section");
            panel.dataset.launchProfileDetails = "1";
            panel.style.cssText = "border:1px solid rgba(15,23,42,.14);border-radius:8px;background:rgba(255,255,255,.94);padding:18px;display:grid;gap:14px;";
            panel.innerHTML = [
              "<div style='display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap'><h2 style='font:700 18px Inter,system-ui,sans-serif;margin:0;color:#0f172a'>Account Details</h2><span style='font:700 12px Inter,system-ui,sans-serif;color:" + (verification.isFullyVerified ? "#15803d" : "#b45309") + "'>" + (verification.isFullyVerified ? "Verified" : "Unverified") + "</span></div>",
              "<dl style='display:grid;grid-template-columns:130px 1fr;gap:8px 12px;margin:0;font:14px Inter,system-ui,sans-serif'><dt style='color:#64748b'>Name</dt><dd style='margin:0'>" + [user.firstName, user.lastName].filter(Boolean).join(" ") + "</dd><dt style='color:#64748b'>Email</dt><dd style='margin:0'>" + user.email + "</dd><dt style='color:#64748b'>EC-ID</dt><dd style='margin:0;font-family:monospace'>" + user.ecId + "</dd><dt style='color:#64748b'>Joined</dt><dd style='margin:0'>" + formatDate(user.createdAt) + "</dd><dt style='color:#64748b'>Trust score</dt><dd style='margin:0'>" + (verification.trustScore || 0) + "</dd></dl>",
              "<div><h3 style='font:700 15px Inter,system-ui,sans-serif;margin:0 0 8px;color:#0f172a'>Current Vote Intent</h3><p style='margin:0;color:#475569;font:14px Inter,system-ui,sans-serif'>" + formatIntentSummary(intent) + "</p></div>",
              "<div><h3 style='font:700 15px Inter,system-ui,sans-serif;margin:0 0 8px;color:#0f172a'>Recent Intent History</h3>" + (history.length ? "<ul style='margin:0;padding-left:18px;color:#475569;font:14px Inter,system-ui,sans-serif'>" + history.map(function(item) { return "<li>" + formatHistoryItem(item) + "</li>"; }).join("") + "</ul>" : "<p style='margin:0;color:#475569;font:14px Inter,system-ui,sans-serif'>No change history yet.</p>") + "</div>",
              "<div style='display:flex;gap:10px;flex-wrap:wrap'><button type='button' data-launch-profile-share style='border:1px solid rgba(29,78,216,.28);border-radius:8px;background:#eff6ff;color:#1d4ed8;padding:9px 12px;font:800 13px Inter,system-ui,sans-serif;cursor:pointer'>Share</button><button type='button' data-launch-profile-logout style='border:1px solid rgba(15,23,42,.18);border-radius:8px;background:#fff;color:#334155;padding:9px 12px;font:800 13px Inter,system-ui,sans-serif;cursor:pointer'>Log out</button></div>"
            ].join("");
            main.appendChild(panel);
          });
        }

        document.addEventListener("keydown", function(event) {
          if (event.key === "Escape" && closeTopDialog()) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        document.addEventListener("click", function(event) {
          var target = event.target && event.target.closest && event.target.closest("a,button,[role='button']");
          var label = labelOf(target);
          if (label === "Verify Identity") {
            event.preventDefault();
            event.stopPropagation();
            showVerificationUnavailableNotice();
            return;
          }
          if (target && target.dataset && target.dataset.launchProfileShare === "1") {
            event.preventDefault();
            if (navigator.share) {
              navigator.share({ title: "Election Countdown", url: location.origin }).catch(function() {});
            } else if (navigator.clipboard) {
              navigator.clipboard.writeText(location.origin).then(function() { showCopyFeedback(target); }).catch(function() {});
            }
            return;
