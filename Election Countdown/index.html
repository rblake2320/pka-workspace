    <script>
      (function normalizeDirectRoutes() {
        var appRoutes = ["/admin", "/profile", "/donor-analytics"];
        if (appRoutes.indexOf(location.pathname) !== -1 && !location.hash) {
          location.replace("/#" + location.pathname);
        }
      })();

    <script>
      (function hardenLaunchTheme() {
        try {
          localStorage.removeItem("theme");
        } catch (error) {}

        function cleanThemeToggle() {
          document.documentElement.classList.remove("dark");

          var buttons = document.querySelectorAll("button");
          buttons.forEach(function(button) {
            var label = (button.textContent || button.getAttribute("aria-label") || "").trim();
            if (label === "Toggle theme") {
              button.remove();
            }
          });
        }

        document.addEventListener("DOMContentLoaded", function() {
          cleanThemeToggle();
          new MutationObserver(cleanThemeToggle).observe(document.body, {
            childList: true,
            subtree: true
          });
        });
      })();
    </script>
    <script>
      (function launchInteractionFixes() {
        var nativeFetch = window.fetch ? window.fetch.bind(window) : null;
        if (nativeFetch && navigator.sendBeacon) {
          window.fetch = function(input, init) {
            var url = typeof input === "string" ? input : input && input.url;
            if (url && url.indexOf("/api/track/") !== -1 && init && String(init.method || "GET").toUpperCase() === "POST") {
              try {
                var body = init.body || "{}";
                var sent = navigator.sendBeacon(url, new Blob([body], { type: "application/json" }));
                if (sent) {
                  return Promise.resolve(new Response(JSON.stringify({ ok: true }), {
                    status: 200,
                    headers: { "content-type": "application/json" }
                  }));
                }
              } catch (error) {}
            }
            return nativeFetch(input, init);
          };
        }

        function labelOf(element) {
          return ((element && (element.innerText || element.getAttribute("aria-label") || element.title)) || "").trim();
        }

        function resetHorizontalDrift() {
          var y = window.scrollY || document.documentElement.scrollTop || 0;
          document.documentElement.scrollLeft = 0;
          document.body.scrollLeft = 0;
          window.scrollTo(0, y);
          document.querySelectorAll("#root > *, .min-h-screen").forEach(function(element) {
            element.scrollLeft = 0;
          });
        }

        function closeTopDialog() {
          var dialogs = Array.from(document.querySelectorAll('[role="dialog"]'));
          var dialog = dialogs[dialogs.length - 1];
          if (!dialog) return false;
          var closeButton = Array.from(dialog.querySelectorAll("button")).find(function(button) {
            return labelOf(button) === "Close" || button.querySelector(".sr-only") && labelOf(button.querySelector(".sr-only")) === "Close";
          });
          if (closeButton) {
            closeButton.click();
            setTimeout(resetHorizontalDrift, 0);
            setTimeout(resetHorizontalDrift, 120);
            return true;
          }
          return false;
        }

        function showCopyFeedback(button) {
          if (!button || button.dataset.launchCopied === "1") return;
          var original = button.innerHTML;
          button.dataset.launchCopied = "1";
          button.textContent = "Copied!";
          setTimeout(function() {
            button.innerHTML = original;
            delete button.dataset.launchCopied;
          }, 1600);
        }

        function ensureRegisteredUndo() {
          var text = document.body ? document.body.innerText || "" : "";
          if (text.indexOf("You're all set!") === -1 || document.querySelector("[data-launch-reset-registration]")) return;
          var candidates = Array.from(document.querySelectorAll("div, section, article")).filter(function(element) {
            return (element.innerText || "").indexOf("You're all set!") !== -1;
          });
          var panel = candidates[candidates.length - 1];
          if (!panel) return;
          var button = document.createElement("button");
          button.type = "button";
          button.dataset.launchResetRegistration = "1";
          button.textContent = "Update registration status";
          button.style.cssText = "margin-top:10px;color:#1d4ed8;background:transparent;border:0;padding:0;font:600 13px Inter,system-ui,sans-serif;text-decoration:underline;cursor:pointer;";
          button.addEventListener("click", function() {
            try { localStorage.removeItem("ec_voter_registered"); } catch (error) {}
            location.reload();
          });
          panel.appendChild(button);
        }

        function hardenAuthEmail(input) {
          if (!input || input.dataset.launchEmailHardened === "1") return;
          input.dataset.launchEmailHardened = "1";
          input.addEventListener("input", function() {
            input.setCustomValidity("");
            var message = input.parentElement && input.parentElement.querySelector("[data-launch-email-error]");
            if (message) message.remove();
          });
          input.addEventListener("invalid", function() {
            input.setCustomValidity("Please enter a valid email address.");
            var parent = input.parentElement;
            if (parent && !parent.querySelector("[data-launch-email-error]")) {
              var message = document.createElement("p");
              message.dataset.launchEmailError = "1";
              message.textContent = "Please enter a valid email address.";
              message.style.cssText = "margin-top:6px;color:#b91c1c;font-size:13px;";
              parent.appendChild(message);
            }
          });
        }

        document.addEventListener("keydown", function(event) {
          if (event.key === "Escape" && closeTopDialog()) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        document.addEventListener("click", function(event) {
          var target = event.target && event.target.closest && event.target.closest("a,button,[role='button']");
          var label = labelOf(target);
          if (label === "Close" || label.indexOf("Sign In") !== -1 || label.indexOf("Share") !== -1) {
            setTimeout(resetHorizontalDrift, 0);
            setTimeout(resetHorizontalDrift, 150);
            setTimeout(resetHorizontalDrift, 450);
          }
          if (label === "Copy Link") {
            setTimeout(function() { showCopyFeedback(target); }, 50);
          }
        }, true);

        document.addEventListener("DOMContentLoaded", function() {
          resetHorizontalDrift();
          var observer = new MutationObserver(function() {
            resetHorizontalDrift();
            ensureRegisteredUndo();
            document.querySelectorAll('input[type="email"]').forEach(hardenAuthEmail);
          });
          observer.observe(document.body, { childList: true, subtree: true });
        });
      })();
    </script>
    <script>
      (function captureLaunchIntelligence() {
        var visitorKey = "ec_visitor_id";
        var visitorId = "";
        try {
          visitorId = localStorage.getItem(visitorKey);
          if (!visitorId) {
            visitorId = "v_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
            localStorage.setItem(visitorKey, visitorId);
          }
        } catch (error) {
          visitorId = "v_anon";
        }

        var currentCountdown = null;
        var currentStartedAt = Date.now();
        var pageStartedAt = Date.now();
        var lastHeartbeatAt = 0;

        function countdownFromText() {
          var text = document.body ? document.body.innerText || "" : "";
          if (text.indexOf("2026 Midterm Elections") !== -1) return "2026_midterms";
          if (text.indexOf("2028 Presidential Election") !== -1) return "2028_presidential";
          if (text.indexOf("2029 Inauguration Day") !== -1) return "2029_inauguration";
          return "unknown";
        }

        function basePayload(extra) {
          return Object.assign({
            visitorId: visitorId,
            path: location.pathname,
            title: document.title,
            referrer: document.referrer || "",
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
            viewport: {
              width: window.innerWidth,
              height: window.innerHeight
            },
            currentCountdown: currentCountdown || countdownFromText(),
            pageElapsedMs: Date.now() - pageStartedAt
          }, extra || {});
        }

        function send(type, payload, beacon) {
          var body = JSON.stringify(basePayload(payload));
          var url = "/api/track/" + encodeURIComponent(type);
          if (navigator.sendBeacon) {
            try {
              if (navigator.sendBeacon(url, new Blob([body], { type: "application/json" }))) {
                return;
              }
            } catch (error) {}
          }
          try {
            fetch(url, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: body,
              keepalive: true,
              credentials: "include"
            }).catch(function() {});
          } catch (error) {}
        }

        function updateCountdown(reason) {
          var next = countdownFromText();
          if (!currentCountdown) {
            currentCountdown = next;
            currentStartedAt = Date.now();
            send("event", { eventName: "countdown_view", countdown: next, reason: reason || "initial" });
            return;
          }
          if (next !== currentCountdown) {
            var previous = currentCountdown;
            var durationMs = Date.now() - currentStartedAt;
            send("flip", {
              eventName: "countdown_change",
              fromCountdown: previous,
              toCountdown: next,
              durationMs: durationMs,
              reason: reason || "detected"
            });
            currentCountdown = next;
            currentStartedAt = Date.now();
          }
        }

        function clickLabel(element) {
          return ((element.innerText || element.getAttribute("aria-label") || element.title || "").trim()).slice(0, 120);
        }

        document.addEventListener("DOMContentLoaded", function() {
          updateCountdown("dom_ready");
          send("event", {
            eventName: "page_view",
            userAgent: navigator.userAgent,
            language: navigator.language || "",
            screen: { width: screen.width, height: screen.height }
          });

          new MutationObserver(function() {
            updateCountdown("dom_mutation");
          }).observe(document.body, { childList: true, subtree: true, characterData: true });
        });

        document.addEventListener("click", function(event) {
          var target = event.target && event.target.closest && event.target.closest("a,button,[role='button']");
          if (!target) return;
          var label = clickLabel(target);
          send("event", {
            eventName: "cta_click",
            label: label,
            href: target.href || "",
            testId: target.getAttribute("data-testid") || "",
            role: target.getAttribute("role") || target.tagName.toLowerCase()
          });
          if ((target.href || "").indexOf("vote.gov") !== -1 || label.indexOf("Vote.gov") !== -1) {
            send("event", { eventName: "vote_gov_click", label: label, href: target.href || "" });
          }
          if (label.indexOf("already registered") !== -1) {
            send("event", { eventName: "already_registered_click" });
          }
        }, true);

        document.addEventListener("visibilitychange", function() {
          if (document.visibilityState === "hidden") {
            send("event", {
              eventName: "visibility_hidden",
              countdownDurationMs: Date.now() - currentStartedAt
            }, true);
          } else {
            currentStartedAt = Date.now();
            send("event", { eventName: "visibility_visible" });
          }
        });

        window.addEventListener("beforeunload", function() {
          send("event", {
            eventName: "page_exit",
            totalDurationMs: Date.now() - pageStartedAt,
            countdownDurationMs: Date.now() - currentStartedAt
          }, true);
        });

        setInterval(function() {
          var now = Date.now();
          if (document.visibilityState === "hidden" || now - lastHeartbeatAt < 14000) return;
          lastHeartbeatAt = now;
          updateCountdown("heartbeat");
          send("event", {
            eventName: "heartbeat",
            countdownDurationMs: now - currentStartedAt
          });
        }, 15000);
      })();
    </script>
