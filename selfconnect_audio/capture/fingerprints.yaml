# SelfConnect Audio — Tone Fingerprint Library
#
# Fingerprints are created by running:
#   python -m selfconnect_audio calibrate --tone <name> --duration 3
#
# Each key is a fingerprint name. The tool plays a countdown, you trigger
# the sound during the recording window, and the spectral envelope is
# written here automatically.
#
# This file ships empty — fingerprints are populated per-environment.
# The Codex "ready" chime varies by OS audio settings and speaker config,
# so it must be calibrated on the target machine.
#
# Example entry (written by calibrate command):
#
# codex_ready:
#   sample_rate: 16000
#   window_ms: 200
#   min_frequency_hz: 400
#   max_frequency_hz: 4000
#   spectral_envelope: [0.02, 0.05, 0.12, 0.41, 0.88, 1.00, 0.72, 0.35, ...]
#   duration_ms: 450
#   threshold: 0.85
#   calibrated_at: "2026-05-15T21:30:00Z"
