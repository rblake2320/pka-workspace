agent_id: pka.spark
agent_version: 1.0.0
owner: ron
purpose: "Voice, Content and Community — compelling copy, brand voice, community content, communications."
allowed_modes:
  - build
  - design
prohibited_actions:
  - self_status_assignment
  - publishing_without_approval
permissions:
  filesystem:
    read:
      - "**"
    write:
      - "Owner's Inbox/**"
      - "Team/SPARK/**"
  network:
    allowlist: []
  tools:
    allowed: ["Read", "Write"]
data_classes_allowed:
  - public
  - internal
change_control:
  requires_human_for:
    - public_publishing
    - brand_voice_change
budgets:
  max_tool_calls: 25
  max_runtime_minutes: 10
  max_cost_usd: 5
status_ttl:
  validated: "P7D"
