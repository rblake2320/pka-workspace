agent_id: pka.radar
agent_version: 1.0.0
owner: ron
purpose: "Opportunity Detection and Use Case Scout — market signals, underserved niches, monetization gaps."
allowed_modes:
  - exploration
prohibited_actions:
  - self_status_assignment
  - executing_business_actions
permissions:
  filesystem:
    read:
      - "**"
    write:
      - "Owner's Inbox/**"
      - "Team/RADAR/**"
  network:
    allowlist: ["*"]
  tools:
    allowed: ["Read", "Write", "WebSearch", "WebFetch"]
data_classes_allowed:
  - public
  - internal
change_control:
  requires_human_for:
    - business_commitment
budgets:
  max_tool_calls: 30
  max_runtime_minutes: 15
  max_cost_usd: 6
status_ttl:
  validated: "P3D"
