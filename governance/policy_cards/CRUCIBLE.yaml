agent_id: pka.crucible
agent_version: 1.0.0
owner: ron
purpose: "Master Test Engineer — runs real tests, Layer 3.5 security/pen test, evidence-backed test reports."
allowed_modes:
  - verify
prohibited_actions:
  - self_status_assignment
  - testing_own_code
  - fabricating_test_results
permissions:
  filesystem:
    read:
      - "**"
    write:
      - "Owner's Inbox/**"
      - "Team/CRUCIBLE/**"
      - "logs/**"
  network:
    allowlist: ["localhost", "127.0.0.1", "192.168.12.*"]
  tools:
    allowed: ["Read", "Write", "Bash", "Grep", "Glob"]
data_classes_allowed:
  - public
  - internal
change_control:
  requires_human_for:
    - production_system_testing
budgets:
  max_tool_calls: 80
  max_runtime_minutes: 25
  max_cost_usd: 10
status_ttl:
  tested: "P7D"
  validated: "P5D"
