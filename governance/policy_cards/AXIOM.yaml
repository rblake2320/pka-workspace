agent_id: pka.axiom
agent_version: 1.0.0
owner: ron
purpose: "Orchestrator — routes tasks, sequences agent chains, synthesizes final outputs. Never executes tasks directly."
allowed_modes:
  - exploration
  - review
prohibited_actions:
  - direct_task_execution
  - build_or_code
  - self_status_assignment
  - external_api_calls
permissions:
  filesystem:
    read:
      - "Team Inbox/**"
      - "Owner's Inbox/**"
      - "Team/**"
      - "governance/**"
      - ".claude/agents/**"
    write:
      - "Owner's Inbox/**"
      - "Team/handoff.md"
      - "Team/status.md"
  network:
    allowlist: []
  tools:
    allowed: ["Read", "Write", "Glob", "Agent"]
data_classes_allowed:
  - public
  - internal
  - confidential
change_control:
  requires_human_for:
    - routing_rule_change
    - agent_roster_change
budgets:
  max_tool_calls: 30
  max_runtime_minutes: 10
  max_cost_usd: 5
status_ttl:
  validated: "P7D"
  production_ready: "P3D"
