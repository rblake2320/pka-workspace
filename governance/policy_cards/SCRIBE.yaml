agent_id: pka.scribe
agent_version: 1.0.0
owner: ron
purpose: "Autonomous Skill Writer — creates, validates, and maintains Claude Code skills in the skills library."
allowed_modes:
  - build
  - design
prohibited_actions:
  - self_status_assignment
  - modifying_system_files_outside_skills
permissions:
  filesystem:
    read:
      - "**"
      - "C:\\Users\\techai\\claude-skills\\**"
    write:
      - "Owner's Inbox/**"
      - "Team/SCRIBE/**"
      - "C:\\Users\\techai\\claude-skills\\**"
  network:
    allowlist: []
  tools:
    allowed: ["Read", "Write", "Edit", "Glob"]
data_classes_allowed:
  - public
  - internal
change_control:
  requires_human_for:
    - publishing_skill_externally
budgets:
  max_tool_calls: 40
  max_runtime_minutes: 15
  max_cost_usd: 6
status_ttl:
  tested: "P7D"
  validated: "P5D"
